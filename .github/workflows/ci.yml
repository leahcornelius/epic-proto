name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  checks:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: workspace/toy-server/package-lock.json

      - name: Run automation script tests
        run: |
          node scripts/ai/run-review-checks.test.js
          node scripts/ai/build-review-prompt.test.js

      - name: Install toy-server dependencies
        working-directory: workspace/toy-server
        run: npm ci

      - name: Run toy-server tests
        working-directory: workspace/toy-server
        run: npm test

      - name: Build toy-server
        working-directory: workspace/toy-server
        run: npm run build
